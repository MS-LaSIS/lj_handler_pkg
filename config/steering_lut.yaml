lj_handler_node:
  ros__parameters:
    # Steering Lookup Table (LUT) for angle-to-ratio mapping.
    #
    # This maps the actual measured steering angle (degrees) to the commanded
    # steering ratio sent to the actuator.
    #
    #   input:  measured/desired steering angle in DEGREES
    #           (negative = left, positive = right)
    #   output: steering ratio in [-1.0, 1.0]
    #           (negative = left, positive = right)
    #
    # Derived from physical characterization data (steering_map.txt):
    #   columns were inverted (angle becomes input, ratio becomes output)
    #   and data is sorted by angle (ascending).
    #
    # Interpolation: monotone cubic (Fritsch-Carlson) - smooth, no overshoots.
    # Rules:
    #   - same length arrays
    #   - input (angles) strictly monotonically increasing
    #   - output (ratios) in [-1.0, 1.0]  (final output clamped to [-1.0, 1.0])
    # If invalid or empty, the node falls back to linear angle/max_steering_angle mapping.

    steering_lut_input: [-28.78, -26.55, -25.30, -22.90, -21.63, -18.50, -18.00, -16.45,
                         -15.13, -13.30, -12.30, -11.80, -10.30,  -8.10,  -6.76,  -6.40,
                          -4.94,  -3.13,  -2.20,  -0.94,   0.00,   0.39,   1.50,   2.50,
                           3.70,   5.00,   6.00,   7.80,   8.45,  10.84,  11.42,  13.11,
                          14.50,  15.42,  16.80,  18.90,  20.57,  21.28,  23.10,  24.00,
                          24.93,  25.31,  25.55]

    # Old steering_lut_output (range [-0.5, 0.5]):
    # [-0.500, -0.475, -0.450, -0.425, -0.400, -0.375, -0.350, -0.325,
    #  -0.300, -0.275, -0.250, -0.225, -0.200, -0.175, -0.150, -0.125,
    #  -0.100, -0.075, -0.050, -0.025,  0.000,  0.025,  0.050,  0.075,
    #   0.100,  0.125,  0.150,  0.175,  0.200,  0.225,  0.250,  0.275,
    #   0.300,  0.325,  0.350,  0.375,  0.400,  0.425,  0.450,  0.475,
    #   0.500,  0.525,  0.550]
    steering_lut_output: [-1.000, -0.950, -0.900, -0.850, -0.800, -0.750, -0.700, -0.650,
                          -0.600, -0.550, -0.500, -0.450, -0.400, -0.350, -0.300, -0.250,
                          -0.200, -0.150, -0.100, -0.050,  0.000,  0.050,  0.100,  0.150,
                           0.200,  0.250,  0.300,  0.350,  0.400,  0.450,  0.500,  0.550,
                           0.600,  0.650,  0.700,  0.750,  0.800,  0.850,  0.900,  0.950,
                           1.000,  1.050,  1.100]
